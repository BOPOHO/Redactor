<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Галерея</title>
    <link rel="manifest" href="gallery-manifest.json">
    <link rel="icon" href="gallery-icon-192.png">
    <link rel="apple-touch-icon" href="gallery-icon-192.png">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Галерея">
    <style>
        :root {
            --bg: #f5f6f8;
            --bg2: #ffffff;
            --bg3: #eef0f4;
            --line: #e4e6ec;
            --txt: #14161c;
            --txt-dim: #6b7080;
            --txt-faint: #a3a8b8;
            --accent: #3b82f6;
            --danger: #ff5c7a;
            --ff: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            background: var(--bg);
            color: var(--txt);
            font-family: var(--ff);
            overflow: hidden;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
        }

        .hidden {
            display: none !important;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--bg2);
            border-bottom: 1px solid var(--line);
            flex: 0 0 auto;
        }

        .topbar h1 {
            font-size: 19px;
            font-weight: 700;
            margin: 0;
            flex: 1;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--txt-dim);
        }

        .icon-btn:active {
            background: var(--bg3);
        }

        .text-btn {
            color: var(--accent);
            font-size: 15px;
            font-weight: 600;
            padding: 8px 10px;
            border-radius: 10px;
        }

        .text-btn:active {
            background: var(--bg3);
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 6px 14px;
            background: var(--bg2);
            border-bottom: 1px solid var(--line);
            flex: 0 0 auto;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 9px 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--txt-dim);
            border-radius: 10px;
            white-space: nowrap;
        }

        .tab.active {
            color: var(--accent);
            background: rgba(59, 130, 246, .1);
        }

        .searchbar {
            display: none;
            padding: 8px 14px;
            background: var(--bg2);
            border-bottom: 1px solid var(--line);
            flex: 0 0 auto;
        }

        .searchbar.show {
            display: block;
        }

        .searchbar input {
            width: 100%;
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: var(--bg3);
            padding: 0 14px;
            font-size: 14.5px;
            color: var(--txt);
        }

        .content-wrap {
            flex: 1;
            position: relative;
            min-height: 0;
            display: flex;
            overflow: hidden;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #scrubber {
            position: absolute;
            right: 2px;
            top: 8px;
            bottom: 8px;
            width: 22px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }

        #scrubber .sitem {
            font-size: 9.5px;
            color: var(--txt-faint);
            font-weight: 700;
            text-transform: lowercase;
        }

        #scrubber .sitem.active {
            color: var(--accent);
        }

        .scrub-bubble {
            position: fixed;
            right: 34px;
            background: var(--accent);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 14px 14px 14px 2px;
            z-index: 60;
            display: none;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .2);
        }

        .scrub-bubble.show {
            display: block;
        }

        .date-section {
            padding: 14px 12px 2px;
        }

        .date-head {
            font-size: 14px;
            font-weight: 700;
            color: var(--txt);
            padding: 0 4px 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
        }

        .cell {
            position: relative;
            aspect-ratio: 1/1;
            background: var(--bg3);
            border-radius: 6px;
            overflow: hidden;
        }

        .cell img,
        .cell video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .cell .dur {
            position: absolute;
            right: 4px;
            bottom: 4px;
            background: rgba(0, 0, 0, .55);
            color: #fff;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 6px;
        }

        .cell .vidmark {
            position: absolute;
            left: 4px;
            bottom: 4px;
            color: #fff;
            font-size: 13px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, .8);
        }

        .cell .fav {
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 14px;
            color: #ffd23f;
            text-shadow: 0 1px 3px rgba(0, 0, 0, .7);
            display: none;
        }

        .cell.is-fav .fav {
            display: block;
        }

        .cell .sentmark {
            position: absolute;
            left: 4px;
            top: 5px;
            font-size: 11px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, .7);
            display: none;
        }

        .cell.is-fav .sentmark {
            left: 22px;
        }

        .cell.is-sent .sentmark {
            display: block;
        }

        .cell .check {
            display: none;
            position: absolute;
            top: 5px;
            right: 5px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, .25);
            box-shadow: 0 0 2px rgba(0, 0, 0, .4);
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
        }

        .content.select-mode .cell .check {
            display: flex;
        }

        .cell.selected .check {
            background: var(--accent);
            border-color: var(--accent);
        }

        .cell.selected::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(59, 130, 246, .22);
            border: 2px solid var(--accent);
            border-radius: 6px;
        }

        .cell.selected img,
        .cell.selected video {
            transform: scale(.92);
            border-radius: 4px;
        }

        .albums-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            padding: 14px;
        }

        .album-card {
            border-radius: 14px;
            overflow: hidden;
            background: var(--bg2);
            box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
        }

        .album-cover {
            aspect-ratio: 1/1;
            background: var(--bg3);
        }

        .album-cover img,
        .album-cover video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-meta {
            padding: 8px 10px 10px;
        }

        .album-meta .name {
            font-size: 13.5px;
            font-weight: 600;
        }

        .album-meta .count {
            font-size: 11.5px;
            color: var(--txt-faint);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 30px;
            text-align: center;
            gap: 14px;
        }

        .empty-state .ic {
            font-size: 52px;
        }

        .empty-state h2 {
            font-size: 18px;
            margin: 0;
        }

        .empty-state p {
            font-size: 13.5px;
            color: var(--txt-dim);
            line-height: 1.5;
            margin: 0;
            max-width: 320px;
        }

        .big-btn {
            background: var(--accent);
            color: #fff;
            padding: 0 28px;
            height: 48px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
        }

        .big-btn:active {
            opacity: .85;
        }

        .scan-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            font-size: 12.5px;
            color: var(--txt-dim);
        }

        .spinner {
            width: 15px;
            height: 15px;
            border: 2px solid var(--line);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .selectbar {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--bg2);
            border-top: 1px solid var(--line);
            flex: 0 0 auto;
            flex-wrap: wrap;
            row-gap: 6px;
        }

        .selectbar.show {
            display: flex;
        }

        .selectbar .count {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            min-width: 80px;
        }

        /* крупный/упрощённый режим — для пользователей, которым трудно с мелким интерфейсом */
        body.simple-mode .grid {
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        body.simple-mode .date-head {
            font-size: 19px;
        }

        body.simple-mode .tab {
            font-size: 16px;
            padding: 12px 0;
        }

        body.simple-mode .text-btn {
            font-size: 17px;
        }

        body.simple-mode .icon-btn {
            width: 48px;
            height: 48px;
            font-size: 21px;
        }

        body.simple-mode .big-btn {
            height: 56px;
            font-size: 17px;
        }

        body.simple-mode .selectbar .count {
            font-size: 16px;
        }

        body.simple-mode .topbar h1 {
            font-size: 22px;
        }

        body.simple-mode .searchbar input {
            height: 48px;
            font-size: 17px;
        }

        /* fullscreen viewer */
        #viewer {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 3000;
            display: flex;
            flex-direction: column;
        }

        #viewer.hidden {
            display: none;
        }

        .v-top {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            color: #fff;
            flex: 0 0 auto;
        }

        .v-top .v-date {
            flex: 1;
            text-align: center;
            font-size: 13px;
            opacity: .85;
        }

        .v-stage {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        .v-slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        .v-slide img,
        .v-slide video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            -webkit-touch-callout: none;
        }

        .toast-stack {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 4000;
            align-items: center;
            pointer-events: none;
        }

        .toast {
            background: #1a1c24;
            color: #fff;
            padding: 9px 16px;
            border-radius: 20px;
            font-size: 12.5px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .25);
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="topbar">
            <h1>Галерея</h1>
            <button class="icon-btn" id="btnSearchToggle" title="Поиск">🔍</button>
            <button class="icon-btn" id="btnSimpleMode" title="Крупный режим">Aa</button>
            <button class="icon-btn" id="btnRescan" title="Обновить">⟳</button>
            <button class="text-btn" id="btnSelectMode">Выбрать</button>
        </div>
        <div class="tabs" id="tabs">
            <div class="tab active" data-tab="photos">Фото</div>
            <div class="tab" data-tab="albums">Альбомы</div>
            <div class="tab" data-tab="favorites">★ Избранное</div>
        </div>
        <div class="searchbar" id="searchbar">
            <input type="text" id="searchInput" placeholder="Поиск по названию или дате…">
        </div>
        <div class="content-wrap">
            <div class="content" id="content"></div>
            <div id="scrubber" class="hidden"></div>
            <div class="scrub-bubble" id="scrubBubble"></div>
        </div>
        <div class="selectbar" id="selectbar">
            <button class="text-btn" id="btnCancelSelect">Отмена</button>
            <div class="count" id="selCount">Выбрано: 0</div>
            <button class="icon-btn" id="btnFavSelected" title="В избранное">☆</button>
            <button class="icon-btn" id="btnShareSelected" title="Поделиться">⇪</button>
            <button class="icon-btn" id="btnDeleteSelected" title="Удалить" style="color:var(--danger)">🗑</button>
            <button class="big-btn" id="btnSendEditor" style="height:40px;padding:0 18px;font-size:13.5px">В VideoForge
                →</button>
        </div>
    </div>

    <div id="viewer" class="hidden">
        <div class="v-top">
            <button class="icon-btn" id="btnCloseViewer" style="color:#fff">✕</button>
            <div class="v-date" id="vDate"></div>
            <button class="icon-btn" id="btnFavViewer" style="color:#fff">☆</button>
            <button class="icon-btn" id="btnShareViewer" style="color:#fff">⇪</button>
            <button class="icon-btn" id="btnDeleteViewer" style="color:#fff">🗑</button>
        </div>
        <div class="v-stage" id="vStage"></div>
    </div>

    <div class="toast-stack" id="toastStack"></div>
    <input type="file" id="folderInput" webkitdirectory directory multiple class="hidden">

    <script>
        const $ = (s, r = document) => r.querySelector(s);
        const $all = (s, r = document) => [...r.querySelectorAll(s)];

        // ЕСЛИ редактор лежит по другому пути/домену — поменяй ссылку ниже.
        // По умолчанию считаем, что gallery и videoforge лежат рядом на одном GitHub-аккаунте.
        const EDITOR_URL = '../videoforge/index.html';

        function toast(msg) {
            const stack = $('#toastStack');
            if (stack.children.length >= 2) stack.firstChild.remove();
            const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
            stack.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2200);
        }
        const IMG_EXT = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'heic'];
        const VID_EXT = ['mp4', 'mov', 'webm', 'mkv', '3gp', 'avi', 'm4v'];
        function extOf(name) { const i = name.lastIndexOf('.'); return i >= 0 ? name.slice(i + 1).toLowerCase() : ''; }
        function kindOf(name) { const e = extOf(name); if (IMG_EXT.includes(e)) return 'image'; if (VID_EXT.includes(e)) return 'video'; return null; }
        function fmtDur(s) { if (!isFinite(s)) return ''; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${m}:${String(sec).padStart(2, '0')}`; }
        function dayKey(ts) { const d = new Date(ts); return d.toISOString().slice(0, 10); }
        function dayLabel(ts) {
            const d = new Date(ts); const now = new Date();
            const oneDay = 86400000;
            const dOnly = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
            const nOnly = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const diff = Math.round((nOnly - dOnly) / oneDay);
            if (diff === 0) return 'Сегодня';
            if (diff === 1) return 'Вчера';
            return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
        }

        /* =================== STATE =================== */
        // item: { id (=key), key, name, kind, lastModified, folder, handle?, parentHandle?, file? }
        // id/key строятся из folder+name+lastModified — стабильны между запусками,
        // это и позволяет кэшировать миниатюры и список файлов персистентно.
        let items = [];
        let rootLabel = '';
        let selectMode = false;
        let selectedOrder = []; // хранит порядок ВЫБОРА, а не порядок на экране
        let activeTab = 'photos';
        let searchQuery = '';
        let favorites = new Set();
        let sentSet = new Set();
        const thumbCache = new Map();
        function itemKey(folder, name, lastModified) { return folder + '/' + name + '/' + lastModified; }

        /* =================== IndexedDB: доступ к папке + персистентный кэш (список + миниатюры) + handoff в редактор =================== */
        function openGalleryDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('gallery_db', 2);
                req.onupgradeneeded = () => {
                    const db = req.result;
                    if (!db.objectStoreNames.contains('handles')) db.createObjectStore('handles');
                    if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
                };
                req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error);
            });
        }
        async function saveRootHandle(handle) {
            try { const db = await openGalleryDB(); const tx = db.transaction('handles', 'readwrite'); tx.objectStore('handles').put(handle, 'root'); } catch (e) { }
        }
        async function loadRootHandle() {
            try { const db = await openGalleryDB(); return await new Promise((res, rej) => { const tx = db.transaction('handles', 'readonly'); const rq = tx.objectStore('handles').get('root'); rq.onsuccess = () => res(rq.result || null); rq.onerror = () => rej(rq.error); }); } catch (e) { return null; }
        }
        async function kvGet(key) {
            try { const db = await openGalleryDB(); return await new Promise((res, rej) => { const tx = db.transaction('kv', 'readonly'); const rq = tx.objectStore('kv').get(key); rq.onsuccess = () => res(rq.result); rq.onerror = () => rej(rq.error); }); } catch (e) { return undefined; }
        }
        async function kvSet(key, val) {
            try { const db = await openGalleryDB(); const tx = db.transaction('kv', 'readwrite'); tx.objectStore('kv').put(val, key); } catch (e) { }
        }
        async function kvDelete(key) {
            try { const db = await openGalleryDB(); const tx = db.transaction('kv', 'readwrite'); tx.objectStore('kv').delete(key); } catch (e) { }
        }
        function openHandoffDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('videoforge_handoff', 1);
                req.onupgradeneeded = () => { if (!req.result.objectStoreNames.contains('items')) req.result.createObjectStore('items'); };
                req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error);
            });
        }
        async function loadPersistentSets() {
            const favArr = await kvGet('favorites'); if (Array.isArray(favArr)) favorites = new Set(favArr);
            const sentArr = await kvGet('sent_to_editor'); if (Array.isArray(sentArr)) sentSet = new Set(sentArr);
        }
        async function toggleFavorite(item) {
            if (favorites.has(item.key)) favorites.delete(item.key); else favorites.add(item.key);
            await kvSet('favorites', [...favorites]);
        }

        /* =================== СКАНИРОВАНИЕ =================== */
        const supportsFS = 'showDirectoryPicker' in window;

        async function pickFolder() {
            if (supportsFS) {
                let handle;
                try { handle = await window.showDirectoryPicker({ mode: 'read' }); } catch (e) { return; }
                await saveRootHandle(handle);
                await scanFSHandle(handle);
            } else {
                $('#folderInput').click();
            }
        }
        $('#folderInput').onchange = async (e) => {
            const files = [...e.target.files];
            e.target.value = '';
            if (!files.length) return;
            scanFileList(files);
        };

        function scanFileList(files) {
            items = [];
            for (const f of files) {
                const kind = kindOf(f.name); if (!kind) continue;
                const parts = (f.webkitRelativePath || f.name).split('/');
                const folder = parts.length > 1 ? parts[parts.length - 2] : 'Файлы';
                const lastModified = f.lastModified || Date.now();
                const key = itemKey(folder, f.name, lastModified);
                items.push({ id: key, key, name: f.name, kind, lastModified, folder, file: f });
            }
            items.sort((a, b) => b.lastModified - a.lastModified);
            render();
            if (items.length) toast('Найдено: ' + items.length);
        }

        // ВАЖНО: раньше при каждом запуске галерея заново ходила по всей файловой системе И
        // заново перегенерировала все миниатюры (особенно медленно для видео — там нужно
        // продекодировать кадр). Из-за этого при каждом открытии казалось, что "всё грузится
        // заново". Теперь: 1) при запуске мгновенно показываем список и миниатюры из ПРОШЛОГО
        // сеанса (persistent-кэш в IndexedDB, ключ = папка+имя+дата изменения файла — стабилен
        // между запусками), 2) в фоне тихо пересканируем папку и добавляем ТОЛЬКО те файлы,
        // которых раньше не было — без спиннера и без перегенерации существующих миниатюр.
        async function scanFSHandle(rootHandle, opts = {}) {
            rootLabel = rootHandle.name;
            if (!opts.silent) showScanStatus(true);
            const fresh = [];
            await walkDir(rootHandle, rootHandle.name, fresh);
            if (!opts.silent) showScanStatus(false);
            const prevKeys = new Set(items.map(i => i.key));
            const newCount = fresh.filter(f => !prevKeys.has(f.key)).length;
            items = fresh;
            items.sort((a, b) => b.lastModified - a.lastModified);
            await persistList();
            render();

        async function walkDir(dirHandle, folderLabel, out) {
            try {
                for await (const [name, handle] of dirHandle.entries()) {
                    if (handle.kind === 'directory') {
                        await walkDir(handle, name, out);
                    } else {
                        const kind = kindOf(name); if (!kind) continue;
                        let lastModified = Date.now();
                        try { const f = await handle.getFile(); lastModified = f.lastModified; } catch (e) { continue; }
                        const key = itemKey(folderLabel, name, lastModified);
                        out.push({ id: key, key, name, kind, lastModified, folder: folderLabel, handle, parentHandle: dirHandle });
                    }
                }
            } catch (e) { /* пропускаем недоступные папки */ }

                items.sort((a, b) => b.lastModified - a.lastModified);

            try {
                const perm = await handle.queryPermission({ mode: 'read' });
                if (perm === 'granted') { await scanFSHandle(handle, { silent: hadCache }); return; }

        async function getFileFor(item) {

        function downscaleImageToDataURL(url, maxSize) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => {
                    const scale = Math.min(1, maxSize / Math.max(img.naturalWidth, img.naturalHeight));
                    const w = Math.max(1, Math.round(img.naturalWidth * scale)), h = Math.max(1, Math.round(img.naturalHeight * scale));
                    const c = document.createElement('canvas'); c.width = w; c.height = h;
                    c.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(c.toDataURL('image/jpeg', .72));
                };
                img.onerror = () => resolve(null);
                img.src = url;
            });
        }
        async function loadThumb(cellEl) {
            const id = cellEl.dataset.id;
            const item = items.find(i => i.id === id); if (!item) return;
            if (thumbCache.has(item.key)) { paintThumb(cellEl, thumbCache.get(item.key), item); return; }
            const persisted = await kvGet('thumb:' + item.key);
            if (persisted) { thumbCache.set(item.key, persisted); paintThumb(cellEl, persisted, item); return; }
            const file = await getFileFor(item); if (!file) return;
            const url = URL.createObjectURL(file);
            if (item.kind === 'image') {
                const durl = await downscaleImageToDataURL(url, 320);
                URL.revokeObjectURL(url);
                if (!durl) return;
                thumbCache.set(item.key, durl); paintThumb(cellEl, durl, item);
                kvSet('thumb:' + item.key, durl);
            } else {
                // для видео берём кадр на маленьком canvas, чтобы не держать сотни <video> элементов в DOM
                const v = document.createElement('video'); v.src = url; v.muted = true; v.playsInline = true; v.preload = 'metadata';
                v.addEventListener('loadedmetadata', () => { try { v.currentTime = Math.min(0.3, (v.duration || 1) / 4); } catch (e) { } });

                    try {
                        const c = document.createElement('canvas'); c.width = 160; c.height = 160;
                        const cw = v.videoWidth, ch = v.videoHeight; const scale = Math.max(160 / cw, 160 / ch);
                        const dw = cw * scale, dh = ch * scale;
                        c.getContext('2d').drawImage(v, (160 - dw) / 2, (160 - dh) / 2, dw, dh);
                        const durl = c.toDataURL('image/jpeg', .6);
                        const data = { thumb: durl, dur: v.duration };
                        thumbCache.set(item.key, data); paintThumb(cellEl, data, item);
                        kvSet('thumb:' + item.key, data);

        async function deleteItems(list) {

        // Аккуратный свайп: картинка/видео следует за пальцем во время движения (без рывков),

        (function enableSwipe() {

            stage.addEventListener('pointerdown', e => {

                slide.style.transition = 'none';

            stage.addEventListener('pointermove', e => {
                if (!dragging || !slide) return;
                const dx = e.clientX - startX, dy = e.clientY - startY;
                if (axis === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
                if (axis !== 'x') return;
                curX = dx;
                slide.style.transform = `translateX(${dx}px)`;
            });
            function finish() {
                if (!dragging || !slide) { dragging = false; return; }
                dragging = false;
                slide.style.transition = 'transform .2s ease';
                if (axis === 'x' && Math.abs(curX) > 60) {

            for (const item of selectedOrder) {
                const file = await getFileFor(item); if (!file) continue;
                payload.push({ name: file.name, type: file.type || (item.kind === 'video' ? 'video/mp4' : 'image/jpeg'), lastModified: file.lastModified, blob: file });
                sentSet.add(item.key);
            }
            try {
                const db = await openHandoffDB();
                const tx = db.transaction('items', 'readwrite');
                tx.objectStore('items').put(payload, 'queue');
                await new Promise(res => tx.oncomplete = res);
            } catch (e) { toast('Ошибка передачи файлов'); return; }
            await kvSet('sent_to_editor', [...sentSet]);
            location.href = EDITOR_URL + (EDITOR_URL.includes('?') ? '&' : '?') + 'import=1';
        };

        /* =================== INIT =================== */
        (async function init() {
            await loadPersistentSets();
            applySimpleMode((() => { try { return localStorage.getItem('gallery_simple') === '1'; } catch (e) { return false; } })());
            await tryAutoRestore();
        })();
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('gallery-sw.js').catch(() => { })); }
    </script>
</body>

</html>
