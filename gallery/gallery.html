<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Галерея</title>
    <link rel="manifest" href="gallery-manifest.json">
    <link rel="icon" href="gallery-icon-192.png">
    <link rel="apple-touch-icon" href="gallery-icon-192.png">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Галерея">
    <style>
        :root {
            --bg: #f5f6f8;
            --bg2: #ffffff;
            --bg3: #eef0f4;
            --line: #e4e6ec;
            --txt: #14161c;
            --txt-dim: #6b7080;
            --txt-faint: #a3a8b8;
            --accent: #3b82f6;
            --danger: #ff5c7a;
            --ff: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { margin: 0; height: 100%; background: var(--bg); color: var(--txt); font-family: var(--ff); overflow: hidden; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }
        .hidden { display: none !important; }

        #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

        .topbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg2); border-bottom: 1px solid var(--line); flex: 0 0 auto; }
        .topbar h1 { font-size: 19px; font-weight: 700; margin: 0; flex: 1; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--txt-dim); }
        .icon-btn:active { background: var(--bg3); }
        .text-btn { color: var(--accent); font-size: 15px; font-weight: 600; padding: 8px 10px; border-radius: 10px; }
        .text-btn:active { background: var(--bg3); }

        .tabs { display: flex; gap: 4px; padding: 6px 14px; background: var(--bg2); border-bottom: 1px solid var(--line); flex: 0 0 auto; }
        .tab { flex: 1; text-align: center; padding: 9px 0; font-size: 14px; font-weight: 600; color: var(--txt-dim); border-radius: 10px; }
        .tab.active { color: var(--accent); background: rgba(59,130,246,.1); }

        .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        .date-section { padding: 14px 12px 2px; }
        .date-head { font-size: 14px; font-weight: 700; color: var(--txt); padding: 0 4px 8px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
        .cell { position: relative; aspect-ratio: 1/1; background: var(--bg3); border-radius: 6px; overflow: hidden; }
        .cell img, .cell video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .cell .dur { position: absolute; right: 4px; bottom: 4px; background: rgba(0,0,0,.55); color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 6px; }
        .cell .vidmark { position: absolute; left: 4px; bottom: 4px; color: #fff; font-size: 13px; text-shadow: 0 1px 3px rgba(0,0,0,.8); }
        .cell .check { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; border-radius: 50%; border: 2px solid #fff; background: rgba(0,0,0,.25); box-shadow: 0 0 2px rgba(0,0,0,.4); }
        .cell.selected .check { background: var(--accent); border-color: var(--accent); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
        .cell.selected::after { content: ''; position: absolute; inset: 0; background: rgba(59,130,246,.22); border: 2px solid var(--accent); border-radius: 6px; }
        .cell.selected img, .cell.selected video { transform: scale(.92); border-radius: 4px; }

        .albums-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px; }
        .album-card { border-radius: 14px; overflow: hidden; background: var(--bg2); box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .album-cover { aspect-ratio: 1/1; background: var(--bg3); }
        .album-cover img, .album-cover video { width: 100%; height: 100%; object-fit: cover; }
        .album-meta { padding: 8px 10px 10px; }
        .album-meta .name { font-size: 13.5px; font-weight: 600; }
        .album-meta .count { font-size: 11.5px; color: var(--txt-faint); }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 30px; text-align: center; gap: 14px; }
        .empty-state .ic { font-size: 52px; }
        .empty-state h2 { font-size: 18px; margin: 0; }
        .empty-state p { font-size: 13.5px; color: var(--txt-dim); line-height: 1.5; margin: 0; max-width: 320px; }
        .big-btn { background: var(--accent); color: #fff; padding: 0 28px; height: 48px; border-radius: 24px; font-size: 15px; font-weight: 600; }
        .big-btn:active { opacity: .85; }

        .scan-status { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 12.5px; color: var(--txt-dim); }
        .spinner { width: 15px; height: 15px; border: 2px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .selectbar { display: none; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg2); border-top: 1px solid var(--line); flex: 0 0 auto; }
        .selectbar.show { display: flex; }
        .selectbar .count { flex: 1; font-size: 14px; font-weight: 600; }

        /* fullscreen viewer */
        #viewer { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; flex-direction: column; }
        #viewer.hidden { display: none; }
        .v-top { display: flex; align-items: center; padding: 10px 12px; color: #fff; flex: 0 0 auto; }
        .v-top .v-date { flex: 1; text-align: center; font-size: 13px; opacity: .85; }
        .v-stage { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .v-slide { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; transition: transform .25s ease; }
        .v-slide img, .v-slide video { max-width: 100%; max-height: 100%; object-fit: contain; }

        .toast-stack { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 6px; z-index: 4000; align-items: center; pointer-events: none; }
        .toast { background: #1a1c24; color: #fff; padding: 9px 16px; border-radius: 20px; font-size: 12.5px; box-shadow: 0 8px 20px rgba(0,0,0,.25); }
    </style>
</head>

<body>
    <div id="app">
        <div class="topbar">
            <h1>Галерея</h1>
            <button class="icon-btn" id="btnRescan" title="Обновить">⟳</button>
            <button class="text-btn" id="btnSelectMode">Выбрать</button>
        </div>
        <div class="tabs" id="tabs">
            <div class="tab active" data-tab="photos">Фото</div>
            <div class="tab" data-tab="albums">Альбомы</div>
        </div>
        <div class="content" id="content"></div>
        <div class="selectbar" id="selectbar">
            <button class="text-btn" id="btnCancelSelect">Отмена</button>
            <div class="count" id="selCount">Выбрано: 0</div>
            <button class="big-btn" id="btnSendEditor" style="height:40px;padding:0 18px;font-size:13.5px">В VideoForge →</button>
        </div>
    </div>

    <div id="viewer" class="hidden">
        <div class="v-top">
            <button class="icon-btn" id="btnCloseViewer" style="color:#fff">✕</button>
            <div class="v-date" id="vDate"></div>
            <div style="width:40px"></div>
        </div>
        <div class="v-stage" id="vStage"></div>
    </div>

    <div class="toast-stack" id="toastStack"></div>
    <input type="file" id="folderInput" webkitdirectory directory multiple class="hidden">

    <script>
        const $ = (s, r = document) => r.querySelector(s);
        const $all = (s, r = document) => [...r.querySelectorAll(s)];

        // ЕСЛИ редактор лежит по другому пути/домену — поменяй ссылку ниже.
        // По умолчанию считаем, что gallery и videoforge лежат рядом на одном GitHub-аккаунте.
        const EDITOR_URL = '../videoforge/index.html';

        function toast(msg) {
            const stack = $('#toastStack');
            if (stack.children.length >= 2) stack.firstChild.remove();
            const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
            stack.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2200);
        }
        const IMG_EXT = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'heic'];
        const VID_EXT = ['mp4', 'mov', 'webm', 'mkv', '3gp', 'avi', 'm4v'];
        function extOf(name) { const i = name.lastIndexOf('.'); return i >= 0 ? name.slice(i + 1).toLowerCase() : ''; }
        function kindOf(name) { const e = extOf(name); if (IMG_EXT.includes(e)) return 'image'; if (VID_EXT.includes(e)) return 'video'; return null; }
        function fmtDur(s) { if (!isFinite(s)) return ''; const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${m}:${String(sec).padStart(2, '0')}`; }
        function dayKey(ts) { const d = new Date(ts); return d.toISOString().slice(0, 10); }
        function dayLabel(ts) {
            const d = new Date(ts); const now = new Date();
            const oneDay = 86400000;
            const dOnly = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
            const nOnly = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const diff = Math.round((nOnly - dOnly) / oneDay);
            if (diff === 0) return 'Сегодня';
            if (diff === 1) return 'Вчера';
            return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
        }

        /* =================== STATE =================== */
        // item: { id, name, kind, lastModified, folder, handle? (FS Access) , thumbUrl?, fullUrl? }
        let items = [];
        let rootLabel = '';
        let selectMode = false;
        let selectedOrder = []; // хранит порядок ВЫБОРА, а не порядок на экране
        let activeTab = 'photos';
        const thumbCache = new Map();
        const idCounter = (() => { let n = 0; return () => 'g' + (n++); })();

        /* =================== IndexedDB: сохранённый доступ к папке + handoff в редактор =================== */
        function openGalleryDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('gallery_db', 1);
                req.onupgradeneeded = () => { if (!req.result.objectStoreNames.contains('handles')) req.result.createObjectStore('handles'); };
                req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error);
            });
        }
        async function saveRootHandle(handle) {
            try { const db = await openGalleryDB(); const tx = db.transaction('handles', 'readwrite'); tx.objectStore('handles').put(handle, 'root'); } catch (e) { }
        }
        async function loadRootHandle() {
            try { const db = await openGalleryDB(); return await new Promise((res, rej) => { const tx = db.transaction('handles', 'readonly'); const rq = tx.objectStore('handles').get('root'); rq.onsuccess = () => res(rq.result || null); rq.onerror = () => rej(rq.error); }); } catch (e) { return null; }
        }
        function openHandoffDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('videoforge_handoff', 1);
                req.onupgradeneeded = () => { if (!req.result.objectStoreNames.contains('items')) req.result.createObjectStore('items'); };
                req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error);
            });
        }

        /* =================== СКАНИРОВАНИЕ =================== */
        const supportsFS = 'showDirectoryPicker' in window;

        async function pickFolder() {
            if (supportsFS) {
                let handle;
                try { handle = await window.showDirectoryPicker({ mode: 'read' }); } catch (e) { return; }
                await saveRootHandle(handle);
                await scanFSHandle(handle);
            } else {
                $('#folderInput').click();
            }
        }
        $('#folderInput').onchange = async (e) => {
            const files = [...e.target.files];
            e.target.value = '';
            if (!files.length) return;
            scanFileList(files);
        };

        function scanFileList(files) {
            items = [];
            for (const f of files) {
                const kind = kindOf(f.name); if (!kind) continue;
                const parts = (f.webkitRelativePath || f.name).split('/');
                const folder = parts.length > 1 ? parts[parts.length - 2] : 'Файлы';
                items.push({ id: idCounter(), name: f.name, kind, lastModified: f.lastModified || Date.now(), folder, file: f });
            }
            afterScan();
        }

        async function scanFSHandle(rootHandle) {
            items = []; rootLabel = rootHandle.name;
            showScanStatus(true);
            await walkDir(rootHandle, rootHandle.name);
            showScanStatus(false);
            afterScan();
        }
        async function walkDir(dirHandle, folderLabel) {
            try {
                for await (const [name, handle] of dirHandle.entries()) {
                    if (handle.kind === 'directory') {
                        await walkDir(handle, name);
                    } else {
                        const kind = kindOf(name); if (!kind) continue;
                        let lastModified = Date.now();
                        try { const f = await handle.getFile(); lastModified = f.lastModified; } catch (e) { continue; }
                        items.push({ id: idCounter(), name, kind, lastModified, folder: folderLabel, handle });
                    }
                }
            } catch (e) { /* пропускаем недоступные папки */ }
        }
        function showScanStatus(on) {
            let el = $('#scanStatus');
            if (on) {
                if (!el) { el = document.createElement('div'); el.id = 'scanStatus'; el.className = 'scan-status'; el.innerHTML = `<div class="spinner"></div><span>Сканирую папку…</span>`; $('#content').prepend(el); }
            } else if (el) el.remove();
        }

        function afterScan() {
            items.sort((a, b) => b.lastModified - a.lastModified);
            render();
            if (items.length) toast('Найдено: ' + items.length);
        }

        async function tryAutoRestore() {
            if (!supportsFS) { render(); return; }
            const handle = await loadRootHandle();
            if (!handle) { render(); return; }
            try {
                const perm = await handle.queryPermission({ mode: 'read' });
                if (perm === 'granted') { await scanFSHandle(handle); return; }
            } catch (e) { }
            render(); // покажем экран "разрешить доступ" — без явного жеста браузер не даст requestPermission
        }

        async function reRequestPermission() {
            const handle = await loadRootHandle();
            if (!handle) { pickFolder(); return; }
            try {
                const perm = await handle.requestPermission({ mode: 'read' });
                if (perm === 'granted') { await scanFSHandle(handle); return; }
            } catch (e) { }
            pickFolder();
        }

        /* =================== THUMBNAILS (лениво, через IntersectionObserver) =================== */
        const io = new IntersectionObserver((entries) => {
            entries.forEach(en => { if (en.isIntersecting) { loadThumb(en.target); io.unobserve(en.target); } });
        }, { rootMargin: '200px' });

        async function getFileFor(item) {
            if (item.file) return item.file;
            if (item.handle) { try { return await item.handle.getFile(); } catch (e) { return null; } }
            return null;
        }
        async function loadThumb(cellEl) {
            const id = cellEl.dataset.id;
            const item = items.find(i => i.id === id); if (!item) return;
            if (thumbCache.has(id)) { paintThumb(cellEl, thumbCache.get(id), item); return; }
            const file = await getFileFor(item); if (!file) return;
            const url = URL.createObjectURL(file);
            if (item.kind === 'image') {
                thumbCache.set(id, url); paintThumb(cellEl, url, item);
            } else {
                // для видео берём кадр на маленьком canvas, чтобы не держать сотни <video> элементов в DOM
                const v = document.createElement('video'); v.src = url; v.muted = true; v.playsInline = true; v.preload = 'metadata';
                v.addEventListener('loadedmetadata', () => { try { v.currentTime = Math.min(0.3, (v.duration || 1) / 4); } catch (e) { } });
                v.addEventListener('seeked', () => {
                    try {
                        const c = document.createElement('canvas'); c.width = 160; c.height = 160;
                        const cw = v.videoWidth, ch = v.videoHeight; const scale = Math.max(160 / cw, 160 / ch);
                        const dw = cw * scale, dh = ch * scale;
                        c.getContext('2d').drawImage(v, (160 - dw) / 2, (160 - dh) / 2, dw, dh);
                        const durl = c.toDataURL('image/jpeg', .6);
                        thumbCache.set(id, { thumb: durl, dur: v.duration });
                        paintThumb(cellEl, { thumb: durl, dur: v.duration }, item);
                    } catch (e) { }
                    URL.revokeObjectURL(url);
                }, { once: true });
                v.addEventListener('error', () => URL.revokeObjectURL(url));
            }
        }
        function paintThumb(cellEl, data, item) {
            const img = cellEl.querySelector('img'); if (!img) return;
            if (item.kind === 'video' && data && data.thumb) {
                img.src = data.thumb;
                const dur = cellEl.querySelector('.dur'); if (dur) dur.textContent = fmtDur(data.dur);
            } else if (typeof data === 'string') {
                img.src = data;
            }
        }

        /* =================== RENDER =================== */
        function render() {
            if (!items.length) { renderEmpty(); return; }
            if (activeTab === 'photos') renderPhotos(); else renderAlbums();
            $('#selectbar').classList.toggle('show', selectMode);
        }
        function renderEmpty() {
            const c = $('#content');
            c.innerHTML = `<div class="empty-state">
                <div class="ic">🖼️</div>
                <h2>Нет доступа к фото</h2>
                <p>${supportsFS ? 'Разреши доступ к папке с фото и видео (например DCIM) — это нужно один раз, дальше галерея откроется сама.' : 'Выбери папку с фото и видео на устройстве.'}</p>
                <button class="big-btn" id="btnGrant">Разрешить доступ</button>
            </div>`;
            $('#btnGrant').onclick = () => reRequestPermission();
        }
        function renderPhotos() {
            const c = $('#content'); c.innerHTML = '';
            const groups = new Map();
            items.forEach(it => { const k = dayKey(it.lastModified); if (!groups.has(k)) groups.set(k, []); groups.get(k).push(it); });
            [...groups.keys()].sort().reverse().forEach(k => {
                const list = groups.get(k);
                const sec = document.createElement('div'); sec.className = 'date-section';
                sec.innerHTML = `<div class="date-head">${dayLabel(list[0].lastModified)}</div>`;
                const grid = document.createElement('div'); grid.className = 'grid';
                list.forEach(it => grid.appendChild(makeCell(it)));
                sec.appendChild(grid); c.appendChild(sec);
            });
        }
        function renderAlbums() {
            const c = $('#content'); c.innerHTML = '';
            const groups = new Map();
            items.forEach(it => { if (!groups.has(it.folder)) groups.set(it.folder, []); groups.get(it.folder).push(it); });
            const wrap = document.createElement('div'); wrap.className = 'albums-grid';
            [...groups.entries()].sort((a, b) => b[1].length - a[1].length).forEach(([folder, list]) => {
                const card = document.createElement('div'); card.className = 'album-card';
                card.innerHTML = `<div class="album-cover"><img loading="lazy"></div><div class="album-meta"><div class="name">${folder}</div><div class="count">${list.length} файлов</div></div>`;
                loadAlbumCover(card.querySelector('img'), list[0]);
                card.onclick = () => { activeTab = 'photos'; $all('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'photos')); items = itemsByFolderFirst(folder); renderPhotos(); };
                wrap.appendChild(card);
            });
            c.appendChild(wrap);
        }
        function itemsByFolderFirst(folder) {
            // просто пересортировать существующий массив так, чтобы выбранная папка была видна (не теряем остальные)
            return [...items].sort((a, b) => (a.folder === folder ? -1 : 0) - (b.folder === folder ? -1 : 0) || b.lastModified - a.lastModified);
        }
        async function loadAlbumCover(imgEl, item) {
            if (thumbCache.has(item.id)) { const d = thumbCache.get(item.id); imgEl.src = typeof d === 'string' ? d : d.thumb; return; }
            const file = await getFileFor(item); if (!file) return;
            const url = URL.createObjectURL(file);
            if (item.kind === 'image') { thumbCache.set(item.id, url); imgEl.src = url; return; }
            const v = document.createElement('video'); v.src = url; v.muted = true; v.playsInline = true; v.preload = 'metadata';
            v.addEventListener('loadedmetadata', () => { try { v.currentTime = Math.min(0.3, (v.duration || 1) / 4); } catch (e) { } });
            v.addEventListener('seeked', () => {
                try {
                    const c = document.createElement('canvas'); c.width = 160; c.height = 160;
                    const cw = v.videoWidth, ch = v.videoHeight; const scale = Math.max(160 / cw, 160 / ch);
                    const dw = cw * scale, dh = ch * scale;
                    c.getContext('2d').drawImage(v, (160 - dw) / 2, (160 - dh) / 2, dw, dh);
                    const durl = c.toDataURL('image/jpeg', .6);
                    thumbCache.set(item.id, { thumb: durl, dur: v.duration }); imgEl.src = durl;
                } catch (e) { }
                URL.revokeObjectURL(url);
            }, { once: true });
        }

        let pressTimer = null;
        function makeCell(item) {
            const cell = document.createElement('div'); cell.className = 'cell'; cell.dataset.id = item.id;
            cell.innerHTML = `<img loading="lazy">${item.kind === 'video' ? '<span class="vidmark">▶</span><span class="dur"></span>' : ''}<span class="check">✓</span>`;
            io.observe(cell);
            cell.onpointerdown = () => { pressTimer = setTimeout(() => { if (!selectMode) enterSelectMode(); toggleSelect(item, cell); }, 420); };
            cell.onpointerup = () => clearTimeout(pressTimer);
            cell.onpointerleave = () => clearTimeout(pressTimer);
            cell.onclick = () => { if (selectMode) toggleSelect(item, cell); else openViewer(item); };
            if (selectedOrder.some(i => i.id === item.id)) cell.classList.add('selected');
            return cell;
        }

        function enterSelectMode() { selectMode = true; $('#btnSelectMode').textContent = 'Готово'; $('#selectbar').classList.add('show'); }
        function exitSelectMode() { selectMode = false; selectedOrder = []; $('#btnSelectMode').textContent = 'Выбрать'; $('#selectbar').classList.remove('show'); render(); }
        function toggleSelect(item, cell) {
            const idx = selectedOrder.findIndex(i => i.id === item.id);
            if (idx >= 0) { selectedOrder.splice(idx, 1); cell.classList.remove('selected'); }
            else { selectedOrder.push(item); cell.classList.add('selected'); }
            $('#selCount').textContent = 'Выбрано: ' + selectedOrder.length;
        }
        $('#btnSelectMode').onclick = () => { selectMode ? exitSelectMode() : (enterSelectMode(), render()); };
        $('#btnCancelSelect').onclick = exitSelectMode;
        $('#btnRescan').onclick = () => { if (supportsFS) reRequestPermission(); else $('#folderInput').click(); };

        $all('.tab').forEach(t => t.onclick = () => { activeTab = t.dataset.tab; $all('.tab').forEach(x => x.classList.toggle('active', x === t)); render(); });

        /* =================== ПРОСМОТР =================== */
        let viewerList = [], viewerIdx = 0;
        function openViewer(item) {
            viewerList = items; viewerIdx = items.findIndex(i => i.id === item.id);
            $('#viewer').classList.remove('hidden');
            paintViewer();
        }
        async function paintViewer() {
            const item = viewerList[viewerIdx]; if (!item) return;
            $('#vDate').textContent = dayLabel(item.lastModified);
            const stage = $('#vStage'); stage.innerHTML = '';
            const file = await getFileFor(item); if (!file) return;
            const url = URL.createObjectURL(file);
            const slide = document.createElement('div'); slide.className = 'v-slide';
            if (item.kind === 'video') { const v = document.createElement('video'); v.src = url; v.controls = true; v.autoplay = true; v.playsInline = true; slide.appendChild(v); }
            else { const img = document.createElement('img'); img.src = url; slide.appendChild(img); }
            stage.appendChild(slide);
        }
        $('#btnCloseViewer').onclick = () => { $('#viewer').classList.add('hidden'); $('#vStage').innerHTML = ''; };
        (function enableSwipe() {
            const stage = $('#vStage'); let startX = 0, dragging = false;
            stage.addEventListener('pointerdown', e => { startX = e.clientX; dragging = true; });
            stage.addEventListener('pointerup', e => {
                if (!dragging) return; dragging = false;
                const dx = e.clientX - startX;
                if (Math.abs(dx) > 60) {
                    if (dx < 0 && viewerIdx < viewerList.length - 1) { viewerIdx++; paintViewer(); }
                    else if (dx > 0 && viewerIdx > 0) { viewerIdx--; paintViewer(); }
                }
            });
        })();

        /* =================== ОТПРАВКА В VIDEOFORGE =================== */
        $('#btnSendEditor').onclick = async () => {
            if (!selectedOrder.length) { toast('Сначала выбери файлы'); return; }
            toast('Готовлю ' + selectedOrder.length + ' файлов…');
            const payload = [];
            for (const item of selectedOrder) {
                const file = await getFileFor(item); if (!file) continue;
                payload.push({ name: file.name, type: file.type || (item.kind === 'video' ? 'video/mp4' : 'image/jpeg'), lastModified: file.lastModified, blob: file });
            }
            try {
                const db = await openHandoffDB();
                const tx = db.transaction('items', 'readwrite');
                tx.objectStore('items').put(payload, 'queue');
                await new Promise(res => tx.oncomplete = res);
            } catch (e) { toast('Ошибка передачи файлов'); return; }
            location.href = EDITOR_URL + (EDITOR_URL.includes('?') ? '&' : '?') + 'import=1';
        };

        /* =================== INIT =================== */
        tryAutoRestore();
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('gallery-sw.js').catch(() => { })); }
    </script>
</body>
